# Application Name
spring.application.name=employee-performance-tracker

# Server Port
server.port=8085

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC

spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# Logging Configuration
logging.level.org.springframework.security=INFO
logging.level.com.company.employeetracker=DEBUG
logging.level.org.hibernate.SQL=INFO

# Spring MVC Upload limits (for reports/avatars if any)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
