<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Employee Performance Tracker</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- App Custom Styles -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="login-body">

    <div class="login-card shadow-lg border-0 glass-panel">
        <div class="text-center mb-4">
            <div class="d-inline-flex align-items-center justify-content-center bg-primary text-white rounded-circle p-3 mb-3">
                <i class="bi bi-speedometer2 fs-2 text-light"></i>
            </div>
            <h3 class="fw-bold mb-1 text-primary-theme text-outfit">Welcome Back</h3>
            <p class="text-secondary small">Employee Performance Tracker System</p>
        </div>

        <!-- Alert messages -->
        <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center gap-2 mb-3 py-2 px-3 small border-0 shadow-sm" role="alert">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <div>Invalid username or password.</div>
        </div>
        <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center gap-2 mb-3 py-2 px-3 small border-0 shadow-sm" role="alert">
            <i class="bi bi-check-circle-fill"></i>
            <div>You have been logged out successfully.</div>
        </div>

        <!-- Login Form -->
        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label small fw-semibold">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-person-fill text-muted"></i></span>
                    <input type="text" class="form-control border-start-0" id="username" name="username" placeholder="Enter username" required autofocus>
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label small fw-semibold">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock-fill text-muted"></i></span>
                    <input type="password" class="form-control border-start-0" id="password" name="password" placeholder="Enter password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2.5 fw-bold shadow-sm d-flex align-items-center justify-content-center gap-2 mb-3">
                <i class="bi bi-box-arrow-in-right"></i> Sign In
            </button>
        </form>

        <div class="text-center mt-4 border-top pt-3 text-secondary" style="font-size: 0.8rem;">
            <div>Demo Accounts:</div>
            <div class="mt-1">
                <strong>Admin</strong>: <code class="bg-light p-1 rounded">admin / admin</code> | 
                <strong>HR</strong>: <code class="bg-light p-1 rounded">hr / hr</code>
            </div>
            <div class="mt-1">
                <strong>Manager</strong>: <code class="bg-light p-1 rounded">manager / manager</code>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Init theme support in login page as well
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</body>
</html>
