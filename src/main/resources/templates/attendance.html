<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout('Attendance Logging', ~{::main}, ~{::styles}, ~{::scripts})}">
<head>
    <th:block th:fragment="styles">
        <!-- Page specific styles -->
    </th:block>
</head>
<body>
    <main th:fragment="main">
        <div class="container-fluid p-0">
            <div class="row g-4">
                <!-- Employee Selector & Input Panel -->
                <div class="col-md-5">
                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-header bg-white border-0 py-3">
                            <h6 class="fw-bold mb-0 text-outfit">Select Employee</h6>
                        </div>
                        <div class="card-body">
                            <label for="employeeSelect" class="form-label small fw-semibold">Employee Name</label>
                            <select class="form-select" id="employeeSelect" onchange="onEmployeeSelected(this.value)">
                                <option value="">Select an employee...</option>
                            </select>
                            
                            <div id="averageAttendanceDisplay" class="text-center py-4 bg-light rounded-3 mt-3 d-none">
                                <span class="d-block text-secondary small text-uppercase">Cumulative Average Attendance</span>
                                <h1 class="fw-bold text-success mb-0" id="cumAvgAttendance">0.0%</h1>
                            </div>
                        </div>
                    </div>

                    <!-- Log Attendance Card (Admins & HR only) -->
                    <div sec:authorize="hasAnyRole('ROLE_ADMIN', 'ROLE_HR')" class="card border-0 shadow-sm d-none" id="logAttendanceCard">
                        <div class="card-header bg-white border-0 py-3">
                            <h6 class="fw-bold mb-0 text-outfit">Log Monthly Attendance</h6>
                        </div>
                        <form id="attendanceForm" onsubmit="logAttendance(event)">
                            <div class="card-body py-2">
                                <div class="mb-3">
                                    <label for="monthYear" class="form-label small fw-semibold">Month and Year *</label>
                                    <input type="month" class="form-control" id="monthYear" required>
                                </div>
                                <div class="mb-3">
                                    <label for="attendancePercentage" class="form-label small fw-semibold">Attendance Percentage (0-100) *</label>
                                    <div class="input-group">
                                        <input type="number" class="form-control" id="attendancePercentage" required min="0" max="100" step="any" placeholder="e.g. 96.5">
                                        <span class="input-group-text">%</span>
                                    </div>
                                </div>
                            </div>
                            <div class="card-footer bg-white border-top-0 py-3">
                                <button type="submit" class="btn btn-success w-100">Save Attendance</button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Attendance History Log -->
                <div class="col-md-7">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-header bg-white border-0 py-3">
                            <h6 class="fw-bold mb-0 text-outfit">Monthly Attendance Records</h6>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover align-middle mb-0">
                                    <thead class="table-light">
                                        <tr>
                                            <th class="ps-4">Month/Year</th>
                                            <th class="text-center">Attendance %</th>
                                            <th class="pe-4 text-center">Status</th>
                                        </tr>
                                    </thead>
                                    <tbody id="attendanceHistoryBody">
                                        <tr>
                                            <td colspan="3" class="text-center py-4 text-muted">
                                                Select an employee to view attendance records.
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <th:block th:fragment="scripts">
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                loadEmployees();
                // Set default month to current month
                const now = new Date();
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                document.getElementById('monthYear').value = `${year}-${month}`;
            });

            async function loadEmployees() {
                try {
                    const data = await apiRequest('/api/employees?size=100');
                    const select = document.getElementById('employeeSelect');
                    data.content.forEach(e => {
                        select.insertAdjacentHTML('beforeend', `<option value="${e.id}">${e.firstName} ${e.lastName} (${e.employeeCode})</option>`);
                    });
                } catch (e) {
                    console.error(e);
                }
            }

            function onEmployeeSelected(id) {
                const logCard = document.getElementById('logAttendanceCard');
                const avgDisplay = document.getElementById('averageAttendanceDisplay');
                const tbody = document.getElementById('attendanceHistoryBody');

                if (!id) {
                    if (logCard) logCard.classList.add('d-none');
                    avgDisplay.classList.add('d-none');
                    tbody.innerHTML = `<tr><td colspan="3" class="text-center py-4 text-muted">Select an employee to view attendance records.</td></tr>`;
                    return;
                }

                if (logCard) logCard.classList.remove('d-none');
                avgDisplay.classList.remove('d-none');
                loadEmployeeAttendance(id);
            }

            async function loadEmployeeAttendance(employeeId) {
                try {
                    const history = await apiRequest(`/api/attendance/employee/${employeeId}`);
                    const avg = await apiRequest(`/api/attendance/employee/${employeeId}/average`);

                    document.getElementById('cumAvgAttendance').innerText = avg ? `${avg.toFixed(1)}%` : '0.0%';

                    const tbody = document.getElementById('attendanceHistoryBody');
                    if (!history || history.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="3" class="text-center py-4 text-muted">No attendance logs found.</td></tr>`;
                        return;
                    }

                    tbody.innerHTML = history.map(h => {
                        // Promotion criteria threshold: 95%
                        const statusColor = h.attendancePercentage >= 95.0 ? 'text-success' : 'text-danger';
                        const statusIcon = h.attendancePercentage >= 95.0 ? 'bi-check-circle-fill' : 'bi-exclamation-circle-fill';
                        
                        return `
                            <tr>
                                <td class="ps-4 fw-semibold">${h.monthYear}</td>
                                <td class="text-center fw-bold ${statusColor}">${h.attendancePercentage.toFixed(1)}%</td>
                                <td class="pe-4 text-center">
                                    <i class="bi ${statusIcon} ${statusColor} fs-6"></i>
                                </td>
                            </tr>
                        `;
                    }).join('');
                } catch (e) {
                    console.error(e);
                }
            }

            async function logAttendance(event) {
                event.preventDefault();
                const employeeId = document.getElementById('employeeSelect').value;
                if (!employeeId) return;

                const payload = {
                    employeeId: parseInt(employeeId),
                    monthYear: document.getElementById('monthYear').value,
                    attendancePercentage: parseFloat(document.getElementById('attendancePercentage').value)
                };

                try {
                    await apiRequest('/api/attendance', {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    Toast.show('Attendance logged successfully');
                    document.getElementById('attendancePercentage').value = '';
                    loadEmployeeAttendance(employeeId);
                } catch (e) {
                    // Handled by apiRequest toast
                }
            }
        </script>
    </th:block>
</body>
</html>
