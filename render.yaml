services:
  # 1. MySQL Database Service (Private Service)
  - type: pserv
    name: ets-mysql-db
    runtime: image
    image: mysql:8.0
    envVars:
      - key: MYSQL_DATABASE
        value: employee_performance_tracker
      - key: MYSQL_ROOT_PASSWORD
        value: root
      - key: MYSQL_USER
        value: ets_user
      - key: MYSQL_PASSWORD
        value: StrongDbPassword123
    disk:
      name: mysql-db-data
      mountPath: /var/lib/mysql
      sizeGB: 1

  # 2. Java Spring Boot Web Service (Public Web App)
  - type: web
    name: employee-performance-tracker
    runtime: docker
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: default
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://ets-mysql-db:3306/employee_performance_tracker?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - key: SPRING_DATASOURCE_USERNAME
        value: ets_user
      - key: SPRING_DATASOURCE_PASSWORD
        value: StrongDbPassword123
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: PORT
        value: 8085
