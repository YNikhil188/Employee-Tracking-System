<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:fragment="layout(title, content, styles, scripts)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[[${title}]] - Employee Performance Tracker</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- App Custom Styles -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <!-- Page Specific Styles (if any) -->
    <th:block th:replace="${styles}"></th:block>
</head>
<body>

    <!-- Loading Spinner -->
    <div id="loading-spinner" class="d-none">
        <div class="spinner-border text-light" style="width: 3rem; height: 3rem;" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="brand">
            <i class="bi bi-speedometer2 text-primary fs-4"></i>
            <span>Performance tracker</span>
        </div>
        <nav class="nav flex-column mt-3">
            <a class="nav-link" th:classappend="${activeTab == 'dashboard' ? 'active' : ''}" th:href="@{/}">
                <i class="bi bi-grid-1x2-fill"></i> Dashboard
            </a>
            <a class="nav-link" th:classappend="${activeTab == 'employees' ? 'active' : ''}" th:href="@{/employees}">
                <i class="bi bi-people-fill"></i> Employees
            </a>
            <a class="nav-link" th:classappend="${activeTab == 'departments' ? 'active' : ''}" th:href="@{/departments}">
                <i class="bi bi-building-fill"></i> Departments
            </a>
            <a class="nav-link" th:classappend="${activeTab == 'reviews' ? 'active' : ''}" th:href="@{/reviews}">
                <i class="bi bi-star-fill"></i> Reviews
            </a>
            <a class="nav-link" th:classappend="${activeTab == 'goals' ? 'active' : ''}" th:href="@{/goals}">
                <i class="bi bi-flag-fill"></i> Goals
            </a>
            <a class="nav-link" th:classappend="${activeTab == 'attendance' ? 'active' : ''}" th:href="@{/attendance}">
                <i class="bi bi-calendar-check-fill"></i> Attendance
            </a>
            <a class="nav-link" th:classappend="${activeTab == 'reports' ? 'active' : ''}" th:href="@{/reports}">
                <i class="bi bi-file-earmark-bar-graph-fill"></i> Reports
            </a>
        </nav>
    </div>

    <!-- Main Content Area -->
    <div class="main-content">
        <!-- Top Navbar -->
        <header class="top-navbar">
            <div class="d-flex align-items-center gap-3">
                <button class="btn btn-outline-secondary d-lg-none" id="sidebar-toggle" aria-label="Toggle Sidebar">
                    <i class="bi bi-list"></i>
                </button>
                <h4 class="mb-0 text-outfit fw-bold" th:text="${title}">Dashboard</h4>
            </div>
            
            <div class="d-flex align-items-center gap-3">
                <!-- Dark Mode Toggle -->
                <button class="theme-toggle-btn" id="theme-toggle" title="Toggle Light/Dark Theme">
                    <i class="bi bi-moon-fill"></i>
                </button>

                <!-- Profile Dropdown -->
                <div class="dropdown">
                    <button class="btn btn-outline-secondary dropdown-toggle d-flex align-items-center gap-2" type="button" id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-person-circle fs-5"></i>
                        <span th:text="${username}">User</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="userDropdown">
                        <li>
                            <div class="dropdown-header">
                                <span th:text="${username}">username</span>
                                <div class="text-muted small" th:text="${role}">Role</div>
                            </div>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="post" class="d-inline w-100">
                                <button type="submit" class="dropdown-item text-danger d-flex align-items-center gap-2">
                                    <i class="bi bi-box-arrow-right"></i> Logout
                                </button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </header>

        <!-- Main Body Wrapper -->
        <main th:replace="${content}"></main>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Bootstrap JS + Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- App Global JS -->
    <script th:src="@{/js/main.js}"></script>
    <!-- Page Specific Script -->
    <th:block th:replace="${scripts}"></th:block>
</body>
</html>
